<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonitorIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080808;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            background: #0e0e0e;
            border-bottom: 1px solid #1c1c1c;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .logo {
            color: #cc2222;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            flex-shrink: 0;
        }
        .logo span { color: #444; }

        .sep { color: #1e1e1e; flex-shrink: 0; }

        /* Indicateur de connexion SSE */
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #2a2a2a;
            transition: background 0.4s;
        }
        .status-dot.connected    { background: #33aa33; }
        .status-dot.reconnecting { background: #cc4400; animation: blink 0.8s infinite; }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        #status-text { font-size: 10px; color: #888; }

        /* Filtres de service */
        .filters {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 3px 9px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .filter-btn:hover  { border-color: #555; color: #bbb; }
        .filter-btn.active { border-color: #777; color: #eeeeee; background: #141414; }

        /* Champ de recherche textuelle */
        .search-input {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #aaa;
            padding: 3px 8px;
            font-family: inherit;
            font-size: 10px;
            width: 150px;
            outline: none;
            letter-spacing: 0.5px;
            border-radius: 2px;
            transition: border-color 0.2s, color 0.2s;
        }
        .search-input:focus         { border-color: #555; color: #eee; }
        .search-input::placeholder  { color: #333; }
        .search-input.active        { border-color: #777; color: #eee; }

        /* Actions */
        .actions { display: flex; gap: 6px; align-items: center; }

        .btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #999;
            padding: 4px 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 2px;
            transition: all 0.2s;
        }
        .btn:hover { border-color: #555; color: #ddd; }
        .btn.alert-active { border-color: #cc2222; color: #cc2222; }

        /* --- Barre de stats --- */
        .stats {
            background: #0a0a0a;
            border-bottom: 1px solid #141414;
            padding: 4px 16px;
            display: flex;
            gap: 22px;
            flex-shrink: 0;
        }

        .stat { font-size: 10px; color: #777; letter-spacing: 1px; }
        .stat b { font-weight: bold; }
        .stat.f b { color: #ff4444; }
        .stat.s b { color: #44dd44; }
        .stat.n b { color: #ffaa00; }
        .stat.t b { color: #aaaaaa; }

        /* --- Zone de logs --- */
        #log-container {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        .log-line {
            display: flex;
            gap: 0;
            padding: 1px 0;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-all;
            border-left: 2px solid transparent;
        }
        .log-line:hover { background: #0d0d0d; }

        /* Couleurs par type d'evenement */
        .log-line.normal            { color: #909090; }
        .log-line.failure           { color: #ff3333; border-color: #cc1111; }
        .log-line.success           { color: #33ff55; border-color: #22aa33; }
        .log-line.wireguard         { color: #55aaff; border-color: #2266cc; }
        .log-line.wireguard_success { color: #33ffcc; border-color: #11aa88; }
        .log-line.wireguard_failure { color: #ff6633; border-color: #cc3311; }
        .log-line.ban               { color: #ff9900; border-color: #bb6600; }
        .log-line.unban             { color: #ffee00; border-color: #ccaa00; }
        .log-line.nftables          { color: #dd66ff; border-color: #9922bb; }

        .log-ts   { flex-shrink:0; min-width:145px; padding:0 8px 0 14px; opacity:0.5; }
        .log-svc  { flex-shrink:0; min-width:80px;  padding-right:10px;  opacity:0.75; }
        .log-text { flex:1; padding-right:12px; }

        /* --- Scrollbar minimaliste --- */
        ::-webkit-scrollbar       { width: 3px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #1c1c1c; }

        /* --- Modal --- */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        .overlay.open { display: flex; }

        .modal {
            background: #0e0e0e;
            border: 1px solid #222;
            padding: 26px 28px;
            width: 430px;
            max-width: 95vw;
        }

        .modal-title {
            color: #555;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a1a1a;
        }

        /* Toggle d'activation */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .toggle-label { color: #666; font-size: 11px; letter-spacing: 1px; }

        .toggle-switch {
            width: 34px;
            height: 18px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 9px;
            cursor: pointer;
            position: relative;
            transition: background 0.25s, border-color 0.25s;
        }
        .toggle-switch.on { background: #661111; border-color: #881111; }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #333;
            transition: transform 0.25s, background 0.25s;
        }
        .toggle-switch.on::after { transform: translateX(16px); background: #ee4444; }

        /* Champs formulaire */
        .field { margin-bottom: 13px; }
        .field label {
            display: block;
            color: #555;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .field input, .field select {
            width: 100%;
            background: #080808;
            border: 1px solid #1c1c1c;
            color: #aaa;
            padding: 6px 9px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus, .field select:focus { border-color: #333; }
        .field select option { background: #111; }

        /* Checkboxes niveaux d'alerte */
        .check-group { display: flex; gap: 16px; margin-top: 3px; }
        .check-label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #555;
            font-size: 11px;
            cursor: pointer;
        }
        .check-label input { accent-color: #cc2222; cursor: pointer; }

        /* Feedback */
        .feedback {
            font-size: 10px;
            color: #33aa33;
            min-height: 15px;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .feedback.err { color: #cc3333; }

        /* Boutons du modal */
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #141414;
        }
        .btn-modal {
            flex: 1;
            background: transparent;
            border: 1px solid #222;
            color: #555;
            padding: 7px 0;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .btn-modal:hover      { border-color: #444; color: #999; }
        .btn-modal.close      { flex: 0 0 auto; padding: 7px 14px; }
        .btn-modal.close:hover { border-color: #441111; color: #cc3333; }

        /* --- Panneau IP Stats --- */
        .content-area { flex: 1; display: flex; overflow: hidden; }

        .ip-panel {
            width: 370px;
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            border-left: 1px solid #141414;
            background: #090909;
        }
        .ip-panel.open { display: flex; }

        .ip-panel-header {
            padding: 7px 12px;
            border-bottom: 1px solid #141414;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .ip-panel-title { font-size: 10px; letter-spacing: 2px; color: #444; flex: 1; }

        .ip-panel-summary {
            padding: 4px 12px;
            border-bottom: 1px solid #0e0e0e;
            font-size: 9px;
            color: #2e2e2e;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .ip-list { flex: 1; overflow-y: auto; }

        .ip-row {
            padding: 7px 12px 5px;
            border-bottom: 1px solid #0e0e0e;
        }
        .ip-row:hover { background: #0d0d0d; }

        .ip-row-top {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 3px;
        }
        .ip-badge {
            font-size: 8px;
            padding: 1px 5px;
            letter-spacing: 1px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .ip-badge.brute_force { background:#2a0808; color:#ff4444; border:1px solid #441111; }
        .ip-badge.scan        { background:#1e1000; color:#ff8833; border:1px solid #442200; }
        .ip-badge.probe       { background:#151500; color:#bbaa00; border:1px solid #333300; }

        .ip-addr  { flex: 1; font-size: 12px; color: #c8c8c8; }
        .ip-count { flex-shrink: 0; font-size: 13px; font-weight: bold; min-width: 28px; text-align: right; }
        .ip-count.brute_force { color: #ff4444; }
        .ip-count.scan        { color: #ff8833; }
        .ip-count.probe       { color: #bbaa00; }

        .ip-bar { height: 2px; background: #151515; margin: 2px 0 4px; border-radius: 1px; overflow: hidden; }
        .ip-bar-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }
        .ip-bar-fill.brute_force { background: #ff4444; }
        .ip-bar-fill.scan        { background: #ff8833; }
        .ip-bar-fill.probe       { background: #bbaa00; }

        .ip-meta { font-size: 9px; color: #2e2e2e; letter-spacing: 0.3px; }
        .ip-meta span { margin-right: 10px; }
        .ip-meta .svc { color: #3a3a3a; }

        .ip-empty { padding: 28px 12px; font-size: 10px; color: #222; text-align: center; letter-spacing: 1px; }
        .ip-error { padding: 28px 12px; font-size: 10px; color: #441111; text-align: center; letter-spacing: 1px; }

        /* Etat de chargement du bouton refresh */
        .btn.loading { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>

<!-- En-tete -->
<header>
    <div class="logo">MONITOR<span>IA</span></div>
    <div class="sep">|</div>

    <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">deconnecte</span>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">TOUT</button>
        <button class="filter-btn" data-filter="SSH">SSH</button>
        <button class="filter-btn" data-filter="WireGuard">WIREGUARD</button>
        <button class="filter-btn" data-filter="fail2ban">FAIL2BAN</button>
        <button class="filter-btn" data-filter="nftables">NFTABLES</button>
        <input type="text" class="search-input" id="search-input" placeholder="RECHERCHER...  [ / ]">
    </div>

    <div class="actions">
        <button class="btn" id="btn-scroll"  title="Activer/desactiver le scroll automatique">AUTO-SCROLL</button>
        <button class="btn" id="btn-clear"   title="Effacer les logs affiches">EFFACER</button>
        <button class="btn" id="btn-export"  title="Exporter les evenements recents en CSV">EXPORTER</button>
        <button class="btn" id="btn-ips"     title="Statistiques par IP">IPS</button>
        <button class="btn" id="btn-email"   title="Configurer les alertes par email">ALERTES</button>
    </div>
</header>

<!-- Barre de statistiques -->
<div class="stats">
    <div class="stat f">ECHECS <b id="cnt-failure">0</b></div>
    <div class="stat s">SUCCES <b id="cnt-success">0</b></div>
    <div class="stat n">BANS <b id="cnt-ban">0</b></div>
    <div class="stat t">TOTAL <b id="cnt-total">0</b></div>
</div>

<!-- Zone principale : logs + panneau IP cote a cote -->
<div class="content-area">

    <!-- Flux de logs -->
    <div id="log-container"></div>

    <!-- Panneau statistiques par IP (toggle) -->
    <div id="ip-panel" class="ip-panel">
        <div class="ip-panel-header">
            <span class="ip-panel-title">IP STATS</span>
            <button class="btn" id="btn-ip-refresh" title="Actualiser">REFRESH</button>
        </div>
        <div class="ip-panel-summary" id="ip-summary">-</div>
        <div class="ip-list" id="ip-list">
            <div class="ip-empty">AUCUNE ACTIVITE HOSTILE DETECTEE</div>
        </div>
    </div>

</div>

<!-- Modal configuration email -->
<div class="overlay" id="overlay">
    <div class="modal">
        <div class="modal-title">Configuration alertes mail</div>

        <div class="toggle-row">
            <span class="toggle-label">ALERTES ACTIVEES</span>
            <div class="toggle-switch" id="toggle-enabled"></div>
        </div>

        <div class="field">
            <label>Serveur SMTP</label>
            <input type="text" id="smtp-host" placeholder="smtp.gmail.com">
        </div>
        <div class="field">
            <label>Port</label>
            <input type="number" id="smtp-port" placeholder="587">
        </div>
        <div class="field">
            <label>Securite SMTP</label>
            <select id="smtp-security">
                <option value="starttls">STARTTLS (port 587)</option>
                <option value="ssl">SSL/TLS (port 465)</option>
                <option value="none">Aucune (deconseille)</option>
            </select>
        </div>
        <div class="field">
            <label>Utilisateur</label>
            <input type="text" id="smtp-user" placeholder="votre@email.com">
        </div>
        <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="smtp-pass" placeholder="laisser vide pour conserver l'existant">
        </div>
        <div class="field">
            <label>Destinataire des alertes</label>
            <input type="email" id="recipient" placeholder="alerte@email.com">
        </div>
        <div class="field">
            <label>Alerter sur</label>
            <div class="check-group">
                <label class="check-label">
                    <input type="checkbox" id="chk-success" checked> Connexions reussies
                </label>
                <label class="check-label">
                    <input type="checkbox" id="chk-failure"> Echecs
                </label>
                <label class="check-label">
                    <input type="checkbox" id="chk-ban"> Bans fail2ban
                </label>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="modal-actions">
            <button class="btn-modal" id="btn-save">SAUVEGARDER</button>
            <button class="btn-modal" id="btn-test">TESTER</button>
            <button class="btn-modal close" id="btn-close">FERMER</button>
        </div>
    </div>
</div>

<script>
    // ---------------------------------------------------------------------------
    // Etat global
    // ---------------------------------------------------------------------------
    const state = {
        autoScroll:   true,
        activeFilter: 'all',
        searchQuery:  '',
        emailEnabled: false,
        counts: { failure: 0, success: 0, ban: 0, total: 0 },
        // Titre original pour restaurer apres notification
        baseTitle: 'MonitorIA'
    };

    // ---------------------------------------------------------------------------
    // Elements DOM frequemment utilises
    // ---------------------------------------------------------------------------
    const logContainer  = document.getElementById('log-container');
    const statusDot     = document.getElementById('status-dot');
    const statusText    = document.getElementById('status-text');
    const overlay       = document.getElementById('overlay');
    const toggleEnabled = document.getElementById('toggle-enabled');
    const feedback      = document.getElementById('feedback');
    const btnScroll     = document.getElementById('btn-scroll');
    const searchInput   = document.getElementById('search-input');

    // ---------------------------------------------------------------------------
    // Connexion SSE avec reconnexion exponentielle
    // ---------------------------------------------------------------------------
    let evtSource     = null;
    let reconnectDelay = 2000;   // Delai initial en ms
    const RECONNECT_MAX = 30000; // Plafond a 30s

    function connect() {
        evtSource = new EventSource('/stream');

        evtSource.onopen = () => {
            statusDot.className  = 'status-dot connected';
            statusText.textContent = 'connecte';
            // Reinitialiser le backoff apres connexion reussie
            reconnectDelay = 2000;
        };

        evtSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'ping') return;
            appendLog(data);
        };

        evtSource.onerror = () => {
            statusDot.className    = 'status-dot reconnecting';
            statusText.textContent = 'reconnexion dans ' + Math.round(reconnectDelay / 1000) + 's...';
            evtSource.close();
            setTimeout(() => {
                connect();
            }, reconnectDelay);
            // Backoff exponentiel avec plafond
            reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
        };
    }

    // ---------------------------------------------------------------------------
    // Notification dans le titre du navigateur sur evenement hostile
    // ---------------------------------------------------------------------------
    let titleFlashTimer = null;

    function flashTitle(type) {
        // Ne notifier que pour les evenements importants
        if (!['failure', 'wireguard_failure', 'ban'].includes(type)) return;
        // Ne pas re-flasher si deja en cours
        if (titleFlashTimer) return;

        const label = type === 'ban' ? 'BAN' : 'ALERTE';
        document.title = '! ' + label + ' - ' + state.baseTitle;
        titleFlashTimer = setTimeout(() => {
            document.title = state.baseTitle;
            titleFlashTimer = null;
        }, 4000);
    }

    // ---------------------------------------------------------------------------
    // Filtre combine : service + recherche textuelle
    // ---------------------------------------------------------------------------
    function matchesFilters(row) {
        const serviceOk = state.activeFilter === 'all' || row.dataset.service === state.activeFilter;
        const searchOk  = !state.searchQuery || row.dataset.text.includes(state.searchQuery);
        return serviceOk && searchOk;
    }

    // ---------------------------------------------------------------------------
    // Affichage d'une ligne de log (prepend : plus recent en premier)
    // ---------------------------------------------------------------------------
    function appendLog(entry) {
        // Compteurs independants des filtres actifs
        state.counts.total++;
        if (entry.type === 'failure' || entry.type === 'wireguard_failure') state.counts.failure++;
        else if (entry.type === 'success' || entry.type === 'wireguard_success') state.counts.success++;
        else if (entry.type === 'ban' || entry.type === 'unban') state.counts.ban++;
        refreshCounts();

        // Notification dans le titre si la page n'est pas au premier plan
        if (document.hidden) flashTitle(entry.type);

        // Construction de la ligne via le DOM (jamais innerHTML avec des donnees externes)
        const row = document.createElement('div');
        row.className       = 'log-line ' + (entry.type || 'normal');
        row.dataset.service = entry.service;
        // Texte normalise pour la recherche (evite de relire le DOM a chaque frappe)
        row.dataset.text = entry.line.toLowerCase();

        const ts = document.createElement('span');
        ts.className   = 'log-ts';
        ts.textContent = entry.timestamp;

        const svc = document.createElement('span');
        svc.className   = 'log-svc';
        svc.textContent = '[' + entry.service + ']';

        const txt = document.createElement('span');
        txt.className   = 'log-text';
        txt.textContent = entry.line;

        row.appendChild(ts);
        row.appendChild(svc);
        row.appendChild(txt);

        row.style.display = matchesFilters(row) ? 'flex' : 'none';

        // Insertion en tete : les plus recents apparaissent en haut
        logContainer.prepend(row);

        // Limite memoire : supprimer les plus anciens (en bas du DOM)
        while (logContainer.children.length > 2000) {
            logContainer.removeChild(logContainer.lastChild);
        }

        if (state.autoScroll) logContainer.scrollTop = 0;
    }

    function refreshCounts() {
        document.getElementById('cnt-failure').textContent = state.counts.failure;
        document.getElementById('cnt-success').textContent = state.counts.success;
        document.getElementById('cnt-ban').textContent     = state.counts.ban;
        document.getElementById('cnt-total').textContent   = state.counts.total;
    }

    // ---------------------------------------------------------------------------
    // Filtres de service
    // ---------------------------------------------------------------------------
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.activeFilter = btn.dataset.filter;
            document.querySelectorAll('.log-line').forEach(line => {
                line.style.display = matchesFilters(line) ? 'flex' : 'none';
            });
        });
    });

    // ---------------------------------------------------------------------------
    // Recherche textuelle
    // ---------------------------------------------------------------------------
    searchInput.addEventListener('input', () => {
        state.searchQuery = searchInput.value.toLowerCase().trim();
        searchInput.classList.toggle('active', state.searchQuery.length > 0);
        document.querySelectorAll('.log-line').forEach(line => {
            line.style.display = matchesFilters(line) ? 'flex' : 'none';
        });
    });

    // Vider la recherche avec Echap
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
            searchInput.blur();
        }
    });

    // ---------------------------------------------------------------------------
    // Raccourcis clavier
    // ---------------------------------------------------------------------------
    document.addEventListener('keydown', (e) => {
        // "/" pour ouvrir la recherche (hors champs de saisie)
        if (e.key === '/' && document.activeElement.tagName !== 'INPUT'
                          && document.activeElement.tagName !== 'SELECT'
                          && !overlay.classList.contains('open')) {
            e.preventDefault();
            searchInput.focus();
        }
    });

    // ---------------------------------------------------------------------------
    // Auto-scroll
    // ---------------------------------------------------------------------------
    btnScroll.addEventListener('click', () => {
        state.autoScroll = !state.autoScroll;
        btnScroll.style.color       = state.autoScroll ? '' : '#cc2222';
        btnScroll.style.borderColor = state.autoScroll ? '' : '#441111';
        if (state.autoScroll) logContainer.scrollTop = 0;
    });

    // Desactiver l'auto-scroll si l'utilisateur descend dans les anciens logs
    logContainer.addEventListener('scroll', () => {
        if (logContainer.scrollTop > 30 && state.autoScroll) {
            state.autoScroll            = false;
            btnScroll.style.color       = '#cc2222';
            btnScroll.style.borderColor = '#441111';
        }
    });

    // ---------------------------------------------------------------------------
    // Effacement
    // ---------------------------------------------------------------------------
    document.getElementById('btn-clear').addEventListener('click', () => {
        logContainer.innerHTML = '';
        state.counts = { failure: 0, success: 0, ban: 0, total: 0 };
        refreshCounts();
    });

    // ---------------------------------------------------------------------------
    // Export CSV
    // ---------------------------------------------------------------------------
    document.getElementById('btn-export').addEventListener('click', () => {
        // Declenchement d'un telechargement via lien temporaire
        const a = document.createElement('a');
        a.href     = '/api/logs/export';
        a.download = 'monitoria_export.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });

    // ---------------------------------------------------------------------------
    // Panneau IP Stats
    // ---------------------------------------------------------------------------
    const ipPanel      = document.getElementById('ip-panel');
    const ipList       = document.getElementById('ip-list');
    const ipSummary    = document.getElementById('ip-summary');
    const btnIps       = document.getElementById('btn-ips');
    const btnIpRefresh = document.getElementById('btn-ip-refresh');
    let   ipRefreshInterval = null;

    const THREAT_LABEL = { brute_force: 'BRUTE', scan: 'SCAN', probe: 'PROBE' };

    /** Formate un timestamp ISO en temps relatif (ex: "5m", "2h", "3j"). */
    function relativeTime(iso) {
        const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
        if (diff < 60)    return diff + 's';
        if (diff < 3600)  return Math.floor(diff / 60) + 'm';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h';
        return Math.floor(diff / 86400) + 'j';
    }

    /** Construit et injecte le contenu du panneau IP via le DOM. */
    function renderIpStats(data) {
        const total    = data.reduce((s, d) => s + d.count, 0);
        const bruteCnt = data.filter(d => d.threat === 'brute_force').length;
        const scanCnt  = data.filter(d => d.threat === 'scan').length;

        let summary = data.length + ' IP(s)  |  ' + total + ' evenements';
        if (bruteCnt) summary += '  |  ' + bruteCnt + ' brute';
        if (scanCnt)  summary += '  |  ' + scanCnt  + ' scan';
        ipSummary.textContent = summary;

        ipList.innerHTML = '';

        if (!data.length) {
            const empty = document.createElement('div');
            empty.className   = 'ip-empty';
            empty.textContent = 'AUCUNE ACTIVITE HOSTILE DETECTEE';
            ipList.appendChild(empty);
            return;
        }

        const maxCount = data[0].count;
        data.forEach(d => {
            const svcParts = Object.entries(d.services)
                .sort((a, b) => b[1] - a[1])
                .map(([k, v]) => k + ':' + v);
            const pct = Math.max(4, Math.round(d.count / maxCount * 100));

            // Badge de menace
            const badge = document.createElement('span');
            badge.className   = 'ip-badge ' + d.threat;
            badge.textContent = THREAT_LABEL[d.threat] || d.threat.toUpperCase();

            // Adresse IP
            const addr = document.createElement('span');
            addr.className   = 'ip-addr';
            addr.textContent = d.ip;

            // Compteur
            const count = document.createElement('span');
            count.className   = 'ip-count ' + d.threat;
            count.textContent = d.count;

            // Ligne du haut
            const top = document.createElement('div');
            top.className = 'ip-row-top';
            top.appendChild(badge);
            top.appendChild(addr);
            top.appendChild(count);

            // Barre de progression
            const barFill = document.createElement('div');
            barFill.className        = 'ip-bar-fill ' + d.threat;
            barFill.style.width      = pct + '%';
            const bar = document.createElement('div');
            bar.className = 'ip-bar';
            bar.appendChild(barFill);

            // Meta (services, temps)
            const svcSpan = document.createElement('span');
            svcSpan.className   = 'svc';
            svcSpan.textContent = svcParts.join('  ');

            const firstSpan = document.createElement('span');
            firstSpan.textContent = 'debut ' + relativeTime(d.first_seen);

            const lastSpan = document.createElement('span');
            lastSpan.textContent = 'vu ' + relativeTime(d.last_seen);

            const meta = document.createElement('div');
            meta.className = 'ip-meta';
            meta.appendChild(svcSpan);
            meta.appendChild(firstSpan);
            meta.appendChild(lastSpan);

            // Ligne complete
            const row = document.createElement('div');
            row.className = 'ip-row';
            row.appendChild(top);
            row.appendChild(bar);
            row.appendChild(meta);
            ipList.appendChild(row);
        });
    }

    /** Interroge l'API et met a jour l'affichage du panneau IP. */
    async function fetchIpStats() {
        btnIpRefresh.classList.add('loading');
        btnIpRefresh.disabled = true;
        try {
            const r = await fetch('/api/ip-stats');
            if (!r.ok) throw new Error('HTTP ' + r.status);
            renderIpStats(await r.json());
        } catch (e) {
            ipList.innerHTML = '';
            const errDiv = document.createElement('div');
            errDiv.className   = 'ip-error';
            errDiv.textContent = 'ERREUR : impossible de charger les stats IP';
            ipList.appendChild(errDiv);
        } finally {
            btnIpRefresh.classList.remove('loading');
            btnIpRefresh.disabled = false;
        }
    }

    // Toggle ouverture / fermeture du panneau
    btnIps.addEventListener('click', () => {
        const open = ipPanel.classList.toggle('open');
        btnIps.classList.toggle('alert-active', open);
        if (open) {
            fetchIpStats();
            ipRefreshInterval = setInterval(fetchIpStats, 15000);
        } else {
            clearInterval(ipRefreshInterval);
            ipRefreshInterval = null;
        }
    });

    btnIpRefresh.addEventListener('click', fetchIpStats);

    // ---------------------------------------------------------------------------
    // Modal email
    // ---------------------------------------------------------------------------
    function showFeedback(msg, isErr = false) {
        feedback.textContent = msg;
        feedback.className   = 'feedback' + (isErr ? ' err' : '');
        setTimeout(() => { feedback.textContent = ''; feedback.className = 'feedback'; }, 4000);
    }

    async function loadConfig() {
        try {
            const resp = await fetch('/api/config');
            const cfg  = await resp.json();

            document.getElementById('smtp-host').value     = cfg.smtp_host || '';
            document.getElementById('smtp-port').value     = cfg.smtp_port || 587;
            document.getElementById('smtp-user').value     = cfg.smtp_user || '';
            document.getElementById('recipient').value     = cfg.recipient  || '';
            document.getElementById('smtp-pass').value     = '';
            document.getElementById('smtp-security').value = cfg.smtp_security || 'starttls';

            const alertOn = cfg.alert_on || ['success'];
            document.getElementById('chk-success').checked = alertOn.includes('success');
            document.getElementById('chk-failure').checked = alertOn.includes('failure');
            document.getElementById('chk-ban').checked     = alertOn.includes('ban');

            state.emailEnabled          = cfg.enabled || false;
            toggleEnabled.className     = 'toggle-switch' + (state.emailEnabled ? ' on' : '');
        } catch (e) {
            showFeedback('Erreur chargement configuration.', true);
        }
    }

    toggleEnabled.addEventListener('click', () => {
        state.emailEnabled      = !state.emailEnabled;
        toggleEnabled.className = 'toggle-switch' + (state.emailEnabled ? ' on' : '');
    });

    document.getElementById('btn-email').addEventListener('click', () => {
        loadConfig();
        overlay.classList.add('open');
    });

    document.getElementById('btn-close').addEventListener('click', () => {
        overlay.classList.remove('open');
    });

    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('open');
    });

    // Fermer la modal avec Echap
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('open')) {
            overlay.classList.remove('open');
        }
    });

    document.getElementById('btn-save').addEventListener('click', async () => {
        const alertOn = [];
        if (document.getElementById('chk-success').checked) alertOn.push('success');
        if (document.getElementById('chk-failure').checked) alertOn.push('failure');
        if (document.getElementById('chk-ban').checked)     alertOn.push('ban');

        const payload = {
            enabled:       state.emailEnabled,
            smtp_host:     document.getElementById('smtp-host').value.trim(),
            smtp_port:     parseInt(document.getElementById('smtp-port').value) || 587,
            smtp_security: document.getElementById('smtp-security').value,
            smtp_user:     document.getElementById('smtp-user').value.trim(),
            smtp_pass:     document.getElementById('smtp-pass').value,
            recipient:     document.getElementById('recipient').value.trim(),
            alert_on:      alertOn
        };

        try {
            const resp = await fetch('/api/config', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(payload)
            });
            const res = await resp.json();
            if (res.status === 'ok') {
                showFeedback('Configuration sauvegardee.');
                document.getElementById('smtp-pass').value = '';
                const btn = document.getElementById('btn-email');
                btn.classList.toggle('alert-active', state.emailEnabled);
            } else {
                showFeedback(res.error || 'Erreur inconnue.', true);
            }
        } catch (e) {
            showFeedback('Erreur reseau.', true);
        }
    });

    document.getElementById('btn-test').addEventListener('click', async () => {
        showFeedback('Envoi en cours...');
        try {
            const resp = await fetch('/api/test-email', { method: 'POST' });
            const res  = await resp.json();
            if (res.status === 'ok') showFeedback('Email de test envoye avec succes.');
            else showFeedback(res.error || 'Echec envoi.', true);
        } catch (e) {
            showFeedback('Erreur reseau.', true);
        }
    });

    // ---------------------------------------------------------------------------
    // Demarrage
    // ---------------------------------------------------------------------------
    connect();
</script>
</body>
</html>
